<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>Cupid Tales Hunt</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- FLOATING HEARTS -->
<div class="hearts"></div>


<!-- START PAGE -->
<section id="startPage" class="page active">

<h1 class="title">
💘 Cupid Tales
</h1>

<p class="tag">
Treasure Hunt Checkpoint
</p>

<button id="startBtn">
Let's Begin ❤️
</button>

</section>



<!-- PUZZLE PAGE -->
<section id="puzzlePage" class="page">

<h2>Cupid's Secret Map</h2>

<div class="timer">
⏳ <span id="time">60</span>
</div>

<div id="puzzle-container"></div>

<p class="hint">
Tap two tiles to swap
</p>

</section>



<!-- CLUE PAGE -->
<section id="cluePage" class="page">

<div class="clueCard">

✨ Checkpoint Unlocked ✨

<p class="clue">

The ENEMY of my ENEMY  
is my FRIEND.

<br><br>

Tell me my Friend's name.

</p>

</div>

</section>


<script src="script.js"></script>

</body>
</html>
